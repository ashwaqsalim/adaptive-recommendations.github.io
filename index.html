<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>thread&co — Adaptive Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Baloo Bhaijaan 2", sans-serif;
    background: #FAF8F2;
    color: #1A1A1A;
  }

  header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    border-bottom:3px solid #1A1A1A;
  }

  .logo { font-size:24px; font-weight:800; }

  .nav span {
    margin: 0 8px;
    font-weight:700;
    font-size:14px;
    color:#9C9588;
  }

  .grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap:12px;
    padding:20px;
  }

  .card {
    border:2px solid #1A1A1A;
    padding:12px;
    background:white;
    cursor:pointer;
    transition:0.2s;
  }

  .card.added {
    background:#FFF1EC;
    border-color:#FF6B4A;
  }

  .emoji { font-size:26px; }

  .price { font-weight:900; margin-top:6px; }

  .desc { font-size:12px; opacity:0.7; margin-top:4px; }

  .filters {
    padding: 15px 20px;
  }

  .filters button {
    margin:4px;
    padding:6px 10px;
    border:2px solid #1A1A1A;
    background:white;
    cursor:pointer;
    font-weight:700;
  }

  .filters button.active {
    background:#1A1A1A;
    color:white;
  }

  .bag {
    position:sticky;
    bottom:0;
    background:#FFF9E0;
    border-top:3px solid #1A1A1A;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    font-weight:800;
  }
</style>
</head>

<body>

<header>
  <div class="logo">thread&co</div>
  <div class="nav">
    <span>New</span>
    <span>Women</span>
    <span>Men</span>
    <span style="color:#1A1A1A;">Gallery</span>
  </div>
  <div>🛍️</div>
</header>

<div class="filters" id="filters"></div>

<div class="grid" id="grid"></div>

<div class="bag" id="bag" style="display:none;">
  <div id="bagText"></div>
  <button style="padding:8px 14px; border:2px solid #1A1A1A; background:#FF6B4A; color:white; font-weight:800;">
    Checkout →
  </button>
</div>

<script>
const ITEMS = [
  { id: 1, name: "Tailored Wool Coat", price: 145, img: "🧥", category: "Outerwear", desc: "Structured shoulder, knee length." },
  { id: 2, name: "Oxford Shirt", price: 42, img: "👔", category: "Tops", desc: "Crisp cotton, slim fit." },
  { id: 3, name: "Wide-Leg Trousers", price: 58, img: "👖", category: "Bottoms", desc: "Tailored drape fit." },
  { id: 4, name: "Knit Midi Dress", price: 65, img: "👗", category: "Dresses", desc: "Soft ribbed knit." },
  { id: 5, name: "Leather Boots", price: 110, img: "👢", category: "Footwear", desc: "Hand-finished leather." },
  { id: 6, name: "Cashmere Scarf", price: 38, img: "🧣", category: "Accessories", desc: "Lightweight warmth." },
  { id: 7, name: "Denim Jacket", price: 72, img: "🧥", category: "Outerwear", desc: "Cropped fit." },
  { id: 8, name: "Silk Top", price: 34, img: "👚", category: "Tops", desc: "Bias cut silk." }
];

const CATEGORIES = ["All","Outerwear","Tops","Bottoms","Dresses","Footwear","Accessories"];

let state = {
  filter: "All",
  added: {}
};

const grid = document.getElementById("grid");
const filters = document.getElementById("filters");
const bag = document.getElementById("bag");
const bagText = document.getElementById("bagText");

function renderFilters() {
  filters.innerHTML = "";
  CATEGORIES.forEach(c => {
    const btn = document.createElement("button");
    btn.innerText = c;
    if (state.filter === c) btn.classList.add("active");

    btn.onclick = () => {
      state.filter = c;
      render();
    };

    filters.appendChild(btn);
  });
}

function renderItems() {
  grid.innerHTML = "";

  const items = state.filter === "All"
    ? ITEMS
    : ITEMS.filter(i => i.category === state.filter);

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "card" + (state.added[item.id] ? " added" : "");

    div.innerHTML = `
      <div class="emoji">${item.img} ${item.name}</div>
      <div class="price">£${item.price}</div>
      <div class="desc">${item.desc}</div>
      ${state.added[item.id] ? "<strong>✔ Added</strong>" : ""}
    `;

    div.onclick = () => {
      state.added[item.id] = !state.added[item.id];
      render();
    };

    grid.appendChild(div);
  });
}

function renderBag() {
  const count = Object.values(state.added).filter(Boolean).length;
  const total = ITEMS
    .filter(i => state.added[i.id])
    .reduce((s,i) => s + i.price, 0);

  if (count === 0) {
    bag.style.display = "none";
    return;
  }

  bag.style.display = "flex";
  bagText.innerText = `${count} item(s) · £${total}`;
}

function render() {
  renderFilters();
  renderItems();
  renderBag();
}

render();
</script>

</body>
</html>
