<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>thread&co — Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  
  /* Responsive utility for the Explore view grid */
  .adaptive-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(4, 1fr);
  }

  @media (max-width: 850px) {
    .adaptive-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }
  @media (max-width: 650px) {
    .adaptive-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  @media (max-width: 400px) {
    .adaptive-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useRef } = React;

const ITEMS = [
  { id: 1, name: "Tailored Wool Coat",    price: 145, img: "🧥", rating: 4.8, reviews: 1204, category: "Outerwear", tag: "Bestseller", desc: "Structured shoulder, falls just past the knee.", gender: "women" },
  { id: 2, name: "Classic Oxford Shirt",  price: 42,  img: "👔", rating: 4.7, reviews: 980,  category: "Tops",       tag: "Top Rated",   desc: "Crisp cotton, slim fit. Pairs with everything.", gender: "men" },
  { id: 3, name: "Wide-Leg Trousers",     price: 58,  img: "👖", rating: 4.5, reviews: 612,  category: "Bottoms",    tag: null,          desc: "Tailored drape, sits at the waist.", gender: "women" },
  { id: 4, name: "Knit Midi Dress",       price: 65,  img: "👗", rating: 4.6, reviews: 1430, category: "Dresses",    tag: null,          desc: "Ribbed knit, flatters every shape.", gender: "women" },
  { id: 5, name: "Leather Ankle Boots",   price: 110, img: "👢", rating: 4.4, reviews: 540,  category: "Footwear",   tag: null,          desc: "Hand-finished leather, stacked heel.", gender: "unisex" },
  { id: 6, name: "Cashmere Scarf",        price: 38,  img: "🧣", rating: 4.9, reviews: 290,  category: "Accessories", tag: "New",        desc: "Featherweight, made to layer.", gender: "unisex" },
  { id: 7, name: "Cropped Denim Jacket",  price: 72,  img: "🧥", rating: 4.3, reviews: 805,  category: "Outerwear", tag: null,          desc: "Light layer for in-between weather.", gender: "women" },
  { id: 8, name: "Silk Slip Top",         price: 34,  img: "👚", rating: 4.5, reviews: 421,  category: "Tops",       tag: null,          desc: "Bias-cut silk, dresses up or down.", gender: "women" },
  { id: 9, name: "Leather Belt",          price: 28,  img: "👞", rating: 4.6, reviews: 705,  category: "Accessories", tag: null,        desc: "Full-grain leather, brass buckle.", gender: "men" },
  { id: 10, name: "Pleated Midi Skirt",   price: 54,  img: "👗", rating: 4.4, reviews: 388,  category: "Bottoms",    tag: null,          desc: "Soft pleats that move with you.", gender: "women" },
  { id: 11, name: "Canvas Tote",          price: 24,  img: "👜", rating: 4.7, reviews: 950,  category: "Accessories", tag: null,        desc: "Heavyweight canvas, fits a laptop.", gender: "unisex" },
  { id: 12, name: "Suede Loafers",        price: 95,  img: "🥿", rating: 4.5, reviews: 312,  category: "Footwear",   tag: null,          desc: "Soft suede, cushioned insole.", gender: "men" },
];

const NEW_IN_IDS = [6, 4, 1, 12, 8, 11];
const NEW_IN_ITEMS = NEW_IN_IDS.map(id => ITEMS.find(i => i.id === id));

function itemsForSection(section) {
  if (section === "women") return ITEMS.filter(i => i.gender === "women" || i.gender === "unisex");
  if (section === "men")   return ITEMS.filter(i => i.gender === "men" || i.gender === "unisex");
  return ITEMS;
}

function bestPicksFor(items) {
  return [...items].sort((a, b) => b.rating - a.rating).slice(0, 2);
}

function curatedGroupsFor(items) {
  const byCat = {};
  items.forEach(i => { (byCat[i.category] = byCat[i.category] || []).push(i); });
  return Object.entries(byCat).slice(0, 3).map(([label, its]) => ({ label, items: its.slice(0, 3) }));
}

const CATEGORIES = ["All", "Outerwear", "Tops", "Bottoms", "Dresses", "Footwear", "Accessories"];
const SECTIONS = { NEWIN: "newin", WOMEN: "women", MEN: "men" };
const MODES = { DECISIVE: "decisive", CURATED: "curated", EXPLORE: "explore" };

const MODE_CONFIG = {
  [MODES.DECISIVE]: {
    emoji: "🎯",
    label: "Just decide",
    hint: "Short on time? Here are 2 picks that just work, no scrolling required.",
    accent: "#FF6B4A",
    light: "#FFF1EC",
  },
  [MODES.CURATED]: {
    emoji: "🗂️",
    label: "Help me choose",
    hint: "Grouped by type — fewer choices at once, easier decisions.",
    accent: "#9B6BD6",
    light: "#F6F0FF",
  },
  [MODES.EXPLORE]: {
    emoji: "🔍",
    label: "Show everything",
    hint: "Full collection, your call. Filter by category as you go.",
    accent: "#2BA6C9",
    light: "#EBF8FC",
  },
};

const INK = "#1A1A1A";
const PAPER = "#FAF8F2";
const FONT = "'Baloo Bhaijaan 2', sans-serif";

function Stars({ rating, reviews }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
      <div style={{ display: "flex" }}>
        {"★★★★★".split("").map((s, i) => (
          <span key={i} style={{ color: i < Math.floor(rating) ? "#FFB930" : "#E5E0D5", fontSize: 12 }}>{s}</span>
        ))}
      </div>
      <span style={{ color: "#A8A296", fontSize: 11, fontWeight: 600 }}>{rating} · {reviews}</span>
    </div>
  );
}

function Tag({ children, bg = "#fff" }) {
  return (
    <div style={{
      display: "inline-flex", alignItems: "center", gap: 5,
      background: bg, padding: "3px 10px",
      border: `2px solid ${INK}`,
      fontWeight: 800, fontSize: 11, color: INK,
    }}>{children}</div>
  );
}

function ItemCard({ item, accent, light, compact, highlight, reason, added, onToggle, grid }) {
  if (grid) {
    return (
      <div onClick={onToggle} style={{
        background: added ? light : "#fff",
        border: `2.5px solid ${added ? accent : INK}`,
        padding: "13px 12px",
        cursor: "pointer", position: "relative",
        display: "flex", flexDirection: "column", gap: 8,
        boxShadow: added ? `4px 4px 0 ${accent}` : "3px 3px 0 rgba(0,0,0,0.12)",
        transition: "box-shadow 0.15s, background 0.15s, border-color 0.15s",
      }}>
        {item.tag && (
          <div style={{ position: "absolute", top: -12, left: 10 }}>
            <Tag bg={light}>{item.tag}</Tag>
          </div>
        )}
        <div style={{
          fontSize: 32, background: added ? `${accent}1f` : "#FAF7EE",
          border: `2px solid ${INK}`,
          height: 58,
          display: "flex", alignItems: "center", justifyContent: "center",
        }}>{item.img}</div>
        <div style={{ fontWeight: 800, fontSize: 13, color: INK, lineHeight: 1.3 }}>{item.name}</div>
        <Stars rating={item.rating} reviews={item.reviews} />
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: "auto", paddingTop: 2, gap: 4 }}>
          <span style={{ fontWeight: 900, fontSize: 15, color: INK }}>£{item.price}</span>
          <div style={{
            width: 26, height: 26,
            background: added ? accent : "#fff",
            border: `2.5px solid ${INK}`,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 13, color: "#fff", fontWeight: 900,
            flexShrink: 0,
          }}>{added ? "✓" : ""}</div>
        </div>
      </div>
    );
  }

  return (
    <div
      onClick={onToggle}
      style={{
        background: added ? light : "#fff",
        border: `2.5px solid ${added ? accent : highlight ? accent : INK}`,
        padding: compact ? "11px 13px" : "15px",
        display: "flex", alignItems: "center", gap: 13,
        cursor: "pointer", position: "relative",
        boxShadow: added ? `4px 4px 0 ${accent}` : "3px 3px 0 rgba(0,0,0,0.1)",
        transition: "box-shadow 0.15s, background 0.15s, border-color 0.15s",
      }}
    >
      {highlight && (
        <div style={{ position: "absolute", top: -13, left: 10 }}>
          <Tag bg="#FFE177">⭐ TOP PICK</Tag>
        </div>
      )}
      {item.tag && !highlight && (
        <div style={{ position: "absolute", top: -13, left: 10 }}>
          <Tag>{item.tag}</Tag>
        </div>
      )}

      <div style={{
        fontSize: compact ? 26 : 32,
        background: added ? `${accent}1f` : "#FAF7EE",
        border: `2px solid ${INK}`,
        width: compact ? 46 : 56, height: compact ? 46 : 56,
        display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0,
      }}>{item.img}</div>

      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontWeight: 800, fontSize: 14, color: INK }}>{item.name}</div>
        {!compact && <div style={{ color: "#9C9588", fontSize: 11.5, marginTop: 3, lineHeight: 1.4, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{item.desc}</div>}
        {reason && <div style={{ fontSize: 11, color: accent, fontWeight: 700, marginTop: 5 }}>✦ {reason}</div>}
        <div style={{ marginTop: compact ? 4 : 6 }}><Stars rating={item.rating} reviews={item.reviews} /></div>
      </div>

      <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 8, flexShrink: 0 }}>
        <div style={{ fontWeight: 900, fontSize: 15, color: INK }}>£{item.price}</div>
        <div style={{
          width: 28, height: 28,
          background: added ? accent : "#fff",
          border: `2.5px solid ${INK}`,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 14, color: "#fff", fontWeight: 900,
        }}>{added ? "✓" : ""}</div>
      </div>
    </div>
  );
}

function ModeTabs({ mode, onSwitch }) {
  return (
    <div style={{ display: "flex", gap: 0, border: `2.5px solid ${INK}`, flexWrap: "wrap" }}>
      {Object.entries(MODE_CONFIG).map(([key, c], i, arr) => {
        const active = mode === key;
        return (
          <button
            key={key}
            onClick={() => onSwitch(key)}
            style={{
              flex: "1 1 120px",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 7,
              background: active ? c.accent : "#fff",
              color: active ? "#fff" : INK,
              border: "none",
              borderRight: i < arr.length - 1 ? `2.5px solid ${INK}` : "none",
              borderBottom: "none",
              padding: "11px 8px",
              fontSize: 13, fontWeight: 800, cursor: "pointer",
              fontFamily: FONT,
              transition: "background 0.15s, color 0.15s",
            }}
          >
            <span style={{ fontSize: 16 }}>{c.emoji}</span>
            <span style={{ whiteSpace: "nowrap" }}>{c.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function SectionTabs({ section, onSwitch }) {
  const tabs = [
    { key: SECTIONS.NEWIN, label: "New In" },
    { key: SECTIONS.WOMEN, label: "Women" },
    { key: SECTIONS.MEN,   label: "Men" },
  ];
  return (
    <div style={{ display: "flex", gap: 18 }}>
      {tabs.map(t => {
        const active = section === t.key;
        return (
          <span
            key={t.key}
            onClick={() => onSwitch(t.key)}
            style={{
              fontSize: 14, fontWeight: 700, cursor: "pointer",
              color: active ? INK : "#9C9588",
              borderBottom: active ? `2.5px solid ${INK}` : "2.5px solid transparent",
              paddingBottom: 4,
              transition: "color 0.15s, border-color 0.15s",
              whiteSpace: "nowrap"
            }}
          >{t.label}</span>
        );
      })}
    </div>
  );
}

function Carousel({ items, accent, light, added, onToggle }) {
  const trackRef = useRef(null);
  const scrollBy = (dir) => {
    if (trackRef.current) trackRef.current.scrollBy({ left: dir * 260, behavior: "smooth" });
  };
  return (
    <div style={{ position: "relative" }}>
      <div
        ref={trackRef}
        style={{
          display: "flex", gap: 16,
          overflowX: "auto", scrollSnapType: "x mandatory",
          paddingBottom: 6,
          scrollbarWidth: "none",
        }}
      >
        {items.map(item => (
          <div key={item.id} style={{ minWidth: 220, scrollSnapAlign: "start" }}>
            <div
              onClick={() => onToggle(item.id)}
              style={{
                background: added[item.id] ? light : "#fff",
                border: `2.5px solid ${added[item.id] ? accent : INK}`,
                padding: "14px 13px",
                cursor: "pointer", position: "relative",
                display: "flex", flexDirection: "column", gap: 8,
                boxShadow: added[item.id] ? `4px 4px 0 ${accent}` : "3px 3px 0 rgba(0,0,0,0.12)",
                transition: "box-shadow 0.15s, background 0.15s, border-color 0.15s",
              }}
            >
              <div style={{ position: "absolute", top: -12, left: 10 }}>
                <Tag bg={light}>✦ New In</Tag>
              </div>
              <div style={{
                fontSize: 38, background: added[item.id] ? `${accent}1f` : "#FAF7EE",
                border: `2px solid ${INK}`,
                height: 90,
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>{item.img}</div>
              <div style={{ fontWeight: 800, fontSize: 14, color: INK, lineHeight: 1.3 }}>{item.name}</div>
              <Stars rating={item.rating} reviews={item.reviews} />
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 2 }}>
                <span style={{ fontWeight: 900, fontSize: 16, color: INK }}>£{item.price}</span>
                <div style={{
                  width: 26, height: 26,
                  background: added[item.id] ? accent : "#fff",
                  border: `2.5px solid ${INK}`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 13, color: "#fff", fontWeight: 900,
                }}>{added[item.id] ? "✓" : ""}</div>
              </div>
            </div>
          </div>
        ))}
      </div>
      <button onClick={() => scrollBy(-1)} aria-label="Previous" style={{
        position: "absolute", left: -10, top: "38%",
        width: 34, height: 34, borderRadius: "50%",
        background: "#fff", border: `2.5px solid ${INK}`,
        fontSize: 15, fontWeight: 800, cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center",
        boxShadow: "2px 2px 0 rgba(0,0,0,0.15)",
        zIndex: 2
      }}>‹</button>
      <button onClick={() => scrollBy(1)} aria-label="Next" style={{
        position: "absolute", right: -10, top: "38%",
        width: 34, height: 34, borderRadius: "50%",
        background: "#fff", border: `2.5px solid ${INK}`,
        fontSize: 15, fontWeight: 800, cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center",
        boxShadow: "2px 2px 0 rgba(0,0,0,0.15)",
        zIndex: 2
      }}>›</button>
    </div>
  );
}

function App() {
  const [section, setSection] = useState(SECTIONS.WOMEN);
  const [mode, setMode] = useState(MODES.EXPLORE);
  const [added, setAdded] = useState({});
  const [filter, setFilter] = useState("All");
  const [fading, setFading] = useState(false);

  const switchMode = (m) => {
    if (m === mode) return;
    setFading(true);
    setTimeout(() => { setMode(m); setFilter("All"); setFading(false); }, 150);
  };

  const toggle = (id) => setAdded(a => ({ ...a, [id]: !a[id] }));
  const addedCount = Object.values(added).filter(Boolean).length;
  const addedTotal = ITEMS.filter(i => added[i.id]).reduce((s, i) => s + i.price, 0);
  const cfg = MODE_CONFIG[mode];

  const sectionItems = itemsForSection(section);
  const bestPicks = bestPicksFor(sectionItems);
  const curatedGroups = curatedGroupsFor(sectionItems);
  const filtered = filter === "All" ? sectionItems : sectionItems.filter(i => i.category === filter);

  const switchSection = (s) => {
    if (s === section) return;
    setFading(true);
    setTimeout(() => { setSection(s); setFilter("All"); setFading(false); }, 150);
  };

  return (
    <div style={{
      minHeight: "100vh",
      background: PAPER,
      fontFamily: FONT,
      display: "flex", flexDirection: "column", alignItems: "center",
      padding: "0 0 90px",
    }}>
      <div style={{ width: "100%", maxWidth: 920 }}>

        {/* Site header */}
        <div style={{
          borderBottom: `3px solid ${INK}`,
          padding: "20px 24px",
          display: "flex", alignItems: "center", justifyContent: "space-between",
          gap: 16,
          flexWrap: "wrap"
        }}>
          <div style={{ fontWeight: 800, fontSize: 24, color: INK }}>thread&co</div>
          <SectionTabs section={section} onSwitch={switchSection} />
          <div style={{
            color: INK,
            width: 36, height: 36,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 20,
          }}>🛍️</div>
        </div>

        {/* Intro */}
        <div style={{ padding: "32px 24px 0" }}>
          <h1 style={{ fontSize: 32, fontWeight: 800, color: INK, margin: 0 }}>
            {section === SECTIONS.NEWIN ? "Fresh off the rail" : section === SECTIONS.WOMEN ? "Women's collection" : "Men's collection"}
          </h1>
          <p style={{ color: "#9C9588", fontSize: 15, margin: "6px 0 0", fontWeight: 600 }}>
            {section === SECTIONS.NEWIN ? "The latest arrivals, swipe through at your own pace." : "However you like to shop — we'll match the pace."}
          </p>
        </div>

        {/* Mode switcher (Women/Men only) */}
        {section !== SECTIONS.NEWIN && (
          <div style={{ padding: "20px 24px 0" }}>
            <ModeTabs mode={mode} onSwitch={switchMode} />
            <div style={{
              marginTop: 14,
              background: cfg.light,
              border: `2.5px solid ${cfg.accent}`,
              padding: "10px 14px",
              display: "flex", alignItems: "center", gap: 9,
            }}>
              <span style={{ fontSize: 17 }}>{cfg.emoji}</span>
              <span style={{ fontSize: 13, color: cfg.accent, fontWeight: 700 }}>{cfg.hint}</span>
            </div>
          </div>
        )}

        {/* Content */}
        <div style={{
          padding: "20px 24px 24px",
          opacity: fading ? 0 : 1,
          transform: fading ? "translateY(6px)" : "translateY(0)",
          transition: "opacity 0.15s, transform 0.15s",
        }}>

          {section === SECTIONS.NEWIN && (
            <Carousel items={NEW_IN_ITEMS} accent="#2BA6C9" light="#EBF8FC" added={added} onToggle={toggle} />
          )}

          {section !== SECTIONS.NEWIN && mode === MODES.DECISIVE && (
            <div style={{ display: "flex", flexDirection: "column", gap: 16, maxWidth: 480, margin: "0 auto" }}>
              <ItemCard item={bestPicks[0]} accent={cfg.accent} light={cfg.light} highlight reason="Our most-loved piece this season" added={!!added[bestPicks[0].id]} onToggle={() => toggle(bestPicks[0].id)} />
              <ItemCard item={bestPicks[1]} accent={cfg.accent} light={cfg.light} highlight reason="Goes with almost anything you own" added={!!added[bestPicks[1].id]} onToggle={() => toggle(bestPicks[1].id)} />
              <div style={{ textAlign: "center", color: "#C2BCAE", fontSize: 13, fontWeight: 700 }}>
                Just two. Tap to add, or keep it simple and check out.
              </div>
            </div>
          )}

          {section !== SECTIONS.NEWIN && mode === MODES.CURATED && (
            <div style={{ display: "flex", flexDirection: "column", gap: 24, maxWidth: 600, margin: "0 auto" }}>
              {curatedGroups.map(group => (
                <div key={group.label}>
                  <div style={{ marginBottom: 10 }}>
                    <Tag bg={cfg.light}>{group.label}</Tag>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {group.items.map(i => (
                      <ItemCard key={i.id} item={i} accent={cfg.accent} light={cfg.light} compact added={!!added[i.id]} onToggle={() => toggle(i.id)} />
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}

          {section !== SECTIONS.NEWIN && mode === MODES.EXPLORE && (
            <div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 18 }}>
                {CATEGORIES.map(cat => (
                  <button key={cat} onClick={() => setFilter(cat)} style={{
                    background: filter === cat ? cfg.accent : "#fff",
                    color: filter === cat ? "#fff" : INK,
                    border: `2.5px solid ${INK}`,
                    padding: "6px 14px", fontSize: 12, fontWeight: 800,
                    cursor: "pointer", fontFamily: FONT,
                  }}>{cat}</button>
                ))}
              </div>
              <div className="adaptive-grid">
                {filtered.map(i => (
                  <ItemCard key={i.id} item={i} accent={cfg.accent} light={cfg.light} grid added={!!added[i.id]} onToggle={() => toggle(i.id)} />
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Added summary bar */}
        {addedCount > 0 && (
          <div style={{
            position: "sticky",
            bottom: 16,
            margin: "0 24px 24px",
            background: "#FFF9E0",
            border: `2.5px solid ${INK}`,
            padding: "12px 18px",
            display: "flex", alignItems: "center", justifyContent: "space-between",
            boxShadow: "4px 4px 0 rgba(0,0,0,0.15)",
            gap: 12,
            flexWrap: "wrap",
            zIndex: 10
          }}>
            <div style={{ fontSize: 14, color: INK, fontWeight: 800 }}>
              🛍️ {addedCount} item{addedCount > 1 ? "s" : ""} added · £{addedTotal.toFixed(2)}
            </div>
            <button style={{
              background: "#FF6B4A", color: "#fff",
              border: `2.5px solid ${INK}`,
              padding: "9px 20px", fontSize: 13, fontWeight: 800,
              cursor: "pointer", fontFamily: FONT,
              boxShadow: "3px 3px 0 rgba(0,0,0,0.18)",
            }}>
              Continue to bag →
            </button>
          </div>
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
