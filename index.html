function predictDPS(signals) {
  const norm = (val, baseline, cap) => Math.min(val / baseline, cap) / cap;
  const features = {
    timeOnPage:        norm(signals.avgTimeOnProductPage, 30, 4),
    repeatViews:        norm(signals.repeatProductViews, 1, 5),
    cartCycles:         norm(signals.cartAddRemoveCycles, 1, 4),
    itemsBeforePurchase: norm(signals.avgItemsViewedBeforePurchase, 4, 4),
    abandonRate:        signals.cartAbandonRate,
    timeToPurchase:      norm(signals.avgTimeToPurchaseDays, 2, 4),
    supportContacts:     norm(signals.supportContactsAboutChoosing, 1, 3),
  };
  const weights = {
    timeOnPage: 0.18, repeatViews: 0.18, cartCycles: 0.16,
    itemsBeforePurchase: 0.14, abandonRate: 0.18, timeToPurchase: 0.08, supportContacts: 0.08,
  };
  let score = 0;
  Object.keys(weights).forEach(k => { score += features[k] * weights[k]; });
  return Math.round(score * 100);
}

function dpsBand(score) {
  if (score >= 65) return { mode: MODES.DECISIVE, pickCount: 2, color: "#FF6B4A" };
  if (score >= 35) return { mode: MODES.DECISIVE, pickCount: 4, color: "#9B6BD6" };
  return { mode: MODES.EXPLORE, pickCount: 0, color: "#2BA6C9" };
}

function itemsForSection(section) {
  if (section === "women") return ITEMS.filter(i => i.gender === "women" || i.gender === "unisex");
  if (section === "men")   return ITEMS.filter(i => i.gender === "men" || i.gender === "unisex");
  return ITEMS;
}

function bestPicksFor(items, count = 2) {
  return [...items].sort((a, b) => b.rating - a.rating).slice(0, count);
}

function Carousel({ items, accent, light, added, onToggle }) {

    <div style={{ position: "relative" }}>
      <div
        ref={trackRef}
        style={{
          display: "flex", gap: 14,
          overflowX: "auto", scrollSnapType: "x mandatory",
          padding: "12px 2px 8px",
          scrollbarWidth: "none",
        }}

        {items.map(item => (
          <div key={item.id} style={{ minWidth: 180, maxWidth: 200, scrollSnapAlign: "start", flex: 1 }}>

          {section !== SECTIONS.NEWIN && mode === MODES.EXPLORE && (

              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
                {CATEGORIES.map(cat => (
                  <button key={cat} onClick={() => setFilter(cat)} style={{
                    background: filter === cat ? cfg.accent : "#fff",
                    color: filter === cat ? "#fff" : INK,
                    border: `2.5px solid ${INK}`,
                    padding: "4px 10px", fontSize: 11, fontWeight: 800,
                    cursor: "pointer", fontFamily: FONT,
                  }}>{cat}</button>
                ))}
              </div>
              
              {/* Fixed 4-column overflow to auto-fill layout */}
              <div style={{ 
                display: "grid", 
                gridTemplateColumns: "repeat(auto-fill, minmax(145px, 1fr))", 
                gap: 12 
              }}>
                {filtered.map(i => (
                  <ItemCard key={i.id} item={i} accent={cfg.accent} light={cfg.light} grid added={!!added[i.id]} onToggle={() => toggle(i.id)} />
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Global sticky bar adjustment for viewport clipping */}
        {addedCount > 0 && (
          <div style={{
            position: "fixed", bottom: 12,
            left: 12, right: 12,
            zIndex: 999,
            background: "#FFF9E0",
            border: `2.5px solid ${INK}`,
            padding: "10px 14px",
            display: "flex", alignItems: "center", justifyContent: "space-between",
            boxShadow: "4px 4px 0 rgba(0,0,0,0.15)",
          }}>
            <div style={{ fontSize: 13, color: INK, fontWeight: 800, whiteSpace: "nowrap", marginRight: 8 }}>
              🛍️ {addedCount} added · £{addedTotal.toFixed(2)}
            </div>
            <button style={{
              background: "#FF6B4A", color: "#fff",
              border: `2.5px solid ${INK}`,
              padding: "8px 14px", fontSize: 12, fontWeight: 800,
              cursor: "pointer", fontFamily: FONT,
              boxShadow: "2px 2px 0 rgba(0,0,0,0.18)",
              whiteSpace: "nowrap"
            }}>
              Bag →
            </button>
          </div>
        )}

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
